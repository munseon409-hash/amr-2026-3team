controller_server:
  ros__parameters:
    FollowPath:
      plugin: nav2_rotation_shim_controller::RotationShimController
      primary_controller: dwb_core::DWBLocalPlanner
      # Rotation Shim
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.7
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 6.0
      simulate_ahead_time: 5.0
      # DWB
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.6
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.6
      min_speed_theta: 0.1
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 1.0
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.05
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
      - BaseObstacle
      - RotateToGoal
      - Oscillation
      - GoalAlign
      - PathAlign
      - PathDist
      - GoalDist
      # - ObstacleFootprint
      # ObstacleFootprint.scale: 32.0
      BaseObstacle.scale: 0.2
      GoalAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalDist.scale: 24.0
      PathAlign.forward_point_distance: 0.1
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      RotateToGoal.lookahead_time: -1.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
    PurePursuit:
      allow_reversing: false
      angular_dist_threshold: 0.785
      desired_linear_vel: 0.8999999761581421
      forward_sampling_distance: 0.5
      lookahead_dist: 0.6
      lookahead_time: 1.5
      max_allowed_time_to_collision_up_to_carrot: 1.0
      max_angular_accel: 3.2
      max_lookahead_dist: 1.5
      max_robot_pose_search_dist: 10.0
      min_approach_linear_velocity: 0.05
      min_lookahead_dist: 0.3
      plugin: nav2_rotation_shim_controller::RotationShimController
      primary_controller: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      rotate_to_heading_angular_vel: 1.0
      rotate_to_heading_min_angle: 0.785
      simulate_ahead_time: 5.0
      transform_tolerance: 0.3
      use_cost_regulated_linear_velocity_scaling: false
      use_interpolation: false
      use_regulated_linear_velocity_scaling: true
      use_rotate_to_heading: true
      use_velocity_scaled_lookahead_dist: false
    controller_frequency: 10.0
    controller_plugins:
    - FollowPath
    - PurePursuit
    failure_tolerance: 1.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    goal_checker_plugins:
    - general_goal_checker
    min_theta_velocity_threshold: 0.1
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    progress_checker:
      movement_time_allowance: 30.0
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
    progress_checker_plugin: progress_checker
    use_sim_time: false
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false
global_costmap:
  global_costmap:
    ros__parameters:
      always_send_full_costmap: true
      footprint: '[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]'
      footprint_padding: 0.10000000149011612
      global_frame: map
      transform_tolerance: 15.0
      inflation_layer:
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
        plugin: nav2_costmap_2d::InflationLayer
      obstacle_layer:
        enabled: true
        observation_sources: scan
        plugin: nav2_costmap_2d::ObstacleLayer
        scan:
          clearing: true
          data_type: LaserScan
          marking: true
          max_obstacle_height: 2.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 20.0
          raytrace_min_range: 0.0
          topic: /scan
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      publish_frequency: 2.0
      resolution: 0.05
      robot_base_frame: base_link
      static_layer:
        map_subscribe_transient_local: true
        plugin: nav2_costmap_2d::StaticLayer
      track_unknown_space: true
      update_frequency: 2.0
      use_sim_time: false
local_costmap:
  local_costmap:
    ros__parameters:
      always_send_full_costmap: true
      footprint: '[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]'
      footprint_padding: 0.10000000149011612
      global_frame: map
      transform_tolerance: 15.0
      height: 3
      inflation_layer:
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
        plugin: nav2_costmap_2d::InflationLayer
      obstacle_layer:
        enabled: true
        observation_sources: scan
        plugin: nav2_costmap_2d::ObstacleLayer
        scan:
          clearing: true
          data_type: LaserScan
          marking: true
          max_obstacle_height: 2.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 20.0
          raytrace_min_range: 0.0
          topic: /scan
      plugins:
      - obstacle_layer
      - inflation_layer
      publish_frequency: 2.0
      resolution: 0.05
      robot_base_frame: base_link
      rolling_window: true
      update_frequency: 5.0
      use_sim_time: false
      width: 5
